<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat IA Responsivo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #e1e1e6;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 10px;
        }
        /* Contenedor principal estilo celular */
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh; /* Se adapta a la altura disponible de la pantalla */
            background: #202024;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 12px 32px rgba(0,0,0,0.4);
        }
        /* Cabecera del chat */
        .chat-header {
            background-color: #29292e;
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #323238;
        }
        .chat-header h2 {
            font-size: 1.2rem;
            color: #4ea8de;
        }
        /* Historial donde aparecen los mensajes */
        .chat-history {
            flex: 1;
            padding: 15px;
            overflow-y: auto; /* Permite deslizar si hay muchos mensajes */
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        /* Estilo base de las burbujas */
        .message {
            max-width: 80%;
            padding: 10px 14px;
            border-radius: 12px;
            font-size: 0.95rem;
            line-height: 1.4;
            word-wrap: break-word; /* Evita que textos largos rompan la pantalla */
        }
        /* Burbuja de la IA (Izquierda) */
        .message.bot {
            background-color: #29292e;
            color: #e1e1e6;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        /* Burbuja del Usuario (Derecha) */
        .message.user {
            background-color: #4ea8de;
            color: #121214;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }
        /* Barra inferior para escribir */
        .chat-input-area {
            padding: 12px;
            background-color: #29292e;
            display: flex;
            gap: 8px;
            border-top: 1px solid #323238;
        }
        .chat-input-area input {
            flex: 1;
            padding: 12px;
            background-color: #121214;
            border: 1px solid #323238;
            border-radius: 8px;
            color: #e1e1e6;
            font-size: 1rem;
            outline: none;
        }
        .chat-input-area input:focus {
            border-color: #4ea8de;
        }
        .chat-input-area button {
            padding: 0 18px;
            background-color: #4ea8de;
            border: none;
            border-radius: 8px;
            color: #121214;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .chat-input-area button:hover {
            background-color: #64dfdf;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <div class="chat-header">
            <h2>🤖 IA con Chispa v2.0</h2>
        </div>
        
        <!-- Aquí se irán sumando los mensajes automáticamente -->
        <div class="chat-history" id="historial">
            <div class="message bot">¡Hola! Soy tu asistente con personalidad. Pregúntame lo que quieras o pídeme un chiste. 😉</div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="mensaje-usuario" placeholder="Escribe un mensaje..." onkeypress="evaluarEnter(event)">
            <button onclick="enviarMensaje()">Enviar</button>
        </div>
    </div>

    <script>
        const respuestasBot = [
            "Eso suena interesante, cuéntame más.",
            "De acuerdo a mis algoritmos de última generación... tienes toda la razón. 🧠",
            "¿Sabías que los ordenadores no van al colegio porque usan 'pantallas'? ¡Ba-dum-tss! 🥁",
            "Disculpa, me distraje optimizando mi código. ¿Qué decías?",
            "¡Me encanta tu entusiasmo! Sigamos hablando de eso."
        ];

        const chistes = [
            "¿Por qué el libro de matemáticas se quitó la vida? ¡Porque tenía demasiados problemas! 📐",
            "¿Qué le dice un GIF a un JPEG? ¡Anímate hombre! 🎬",
            "¿Qué hace un programador cuando tiene hambre? ¡Come bytes! 🍪"
        ];

        function enviarMensaje() {
            const input = document.getElementById('mensaje-usuario');
            const texto = input.value.trim();
            
            if (texto === "") return; // Ignora si está vacío

            // 1. Agregar mensaje del usuario
            crearBurbuja(texto, 'user');
            input.value = ""; // Limpia el input

            // 2. Simular respuesta de la IA después de un breve instante
            setTimeout(() => {
                let respuesta = "";
                const textoMinuscula = texto.toLowerCase();

                // Respuestas inteligentes basadas en lo que escribes
                if (textoMinuscula.includes("chiste")) {
                    respuesta = chistes[Math.floor(Math.random() * chistes.length)];
                } else if (textoMinuscula.includes("hola") || textoMinuscula.includes("buenas")) {
                    respuesta = "¡Hola de nuevo! ¿En qué andamos hoy? ⚡";
                } else {
                    respuesta = respuestasBot[Math.floor(Math.random() * respuestasBot.length)];
                }

                crearBurbuja(respuesta, 'bot');
            }, 600);
        }

        function crearBurbuja(texto, remitente) {
            const historial = document.getElementById('historial');
            const burbuja = document.createElement('div');
            
            burbuja.classList.add('message', remitente);
            burbuja.innerText = texto;
            
            historial.appendChild(burbuja);
            
            // Auto-scroll automático hacia el último mensaje recibido
            historial.scrollTop = historial.scrollHeight;
        }

        // Permite enviar el mensaje simplemente presionando "Enter" en el teclado del celular
        function evaluarEnter(event) {
            if (event.key === "Enter") {
                enviarMensaje();
            }
        }
    </script>

</body>
</html>
